name: CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Verify imports compile
        run: python -m compileall src

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: zip2telegraph-bot:ci

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - test
      - docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare release archive
        run: |
          tar \
            --exclude-vcs \
            --exclude=.github \
            --exclude=.pytest_cache \
            --exclude=.venv \
            --exclude=tests \
            -czf release.tgz \
            .env.example \
            Dockerfile \
            Dockerfile.telegram-bot-api \
            docker-compose.yml \
            docker-compose.local-bot-api.yml \
            pyproject.toml \
            README.md \
            docs \
            src

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          source: release.tgz
          target: /tmp/zip2telegraph-bot-deploy
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR != '' && secrets.VPS_APP_DIR || '/opt/zip2telegraph-bot' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          envs: APP_DIR
          script_stop: true
          script: |
            set -eux
            trap 'echo "Deploy failed at line $LINENO" >&2' ERR
            APP_DIR="${APP_DIR:-/opt/zip2telegraph-bot}"

            mkdir -p "${APP_DIR}"
            mkdir -p "${APP_DIR}/data" "${APP_DIR}/tmp" "${APP_DIR}/telegram-bot-api-data"
            if [ ! -f "${APP_DIR}/.env" ]; then
              echo "Missing ${APP_DIR}/.env. Upload it manually before deploying." >&2
              exit 1
            fi

            find "${APP_DIR}" -mindepth 1 -maxdepth 1 ! -name data ! -name tmp ! -name telegram-bot-api-data ! -name .env -exec rm -rf {} +
            tar -xzf /tmp/zip2telegraph-bot-deploy/release.tgz -C "${APP_DIR}"

            cd "${APP_DIR}"
            USE_LOCAL_TELEGRAM_BOT_API_VALUE="$(awk -F= '/^USE_LOCAL_TELEGRAM_BOT_API=/{print $2}' .env | tail -n 1)"
            TELEGRAM_API_ID_VALUE="$(awk -F= '/^TELEGRAM_API_ID=/{print $2}' .env | tail -n 1)"
            TELEGRAM_API_HASH_VALUE="$(awk -F= '/^TELEGRAM_API_HASH=/{print $2}' .env | tail -n 1)"
            case "${USE_LOCAL_TELEGRAM_BOT_API_VALUE}" in
              true)
                if [ -z "${TELEGRAM_API_ID_VALUE}" ]; then
                  echo "TELEGRAM_API_ID is required when USE_LOCAL_TELEGRAM_BOT_API=true" >&2
                  exit 1
                fi
                if [ -z "${TELEGRAM_API_HASH_VALUE}" ]; then
                  echo "TELEGRAM_API_HASH is required when USE_LOCAL_TELEGRAM_BOT_API=true" >&2
                  exit 1
                fi
                docker compose -f docker-compose.yml -f docker-compose.local-bot-api.yml up -d --build --remove-orphans
                ;;
              *)
                docker compose up -d --build --remove-orphans
                ;;
            esac
            docker image prune -f
            rm -f /tmp/zip2telegraph-bot-deploy/release.tgz
