services:
  bot:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      TMP_DIR: /app/tmp
      PUBLIC_IMAGE_DIR: /app/public-images
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - ${HOST_TMP_DIR:-./tmp}:/app/tmp
      - ${HOST_PUBLIC_IMAGE_DIR:-./public-images}:/app/public-images
    restart: unless-stopped
